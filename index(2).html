<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Profile Icon Styling */
        .profile-container {
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Puts icon on the right */
            padding: 10px;
        }

        .profile-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0366d6; /* GitHub Blue */
            cursor: pointer;
            transition: transform 0.2s;
        }

        .profile-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header class="profile-container">
        <img src="https://github.com/kakikajv.png" alt="Profile" class="profile-icon">
    </header>

    <main>
        <h1>Welcome to my project</h1>
        <p>This is a new page with a profile icon added.</p>
    </main>

</body>
</html>
