<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WATCHFLOW | Premium Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070708;
            --card-glass: rgba(255, 255, 255, 0.03);
            --neon-cyan: #00f2ff;
            --electric-purple: #8a2be2;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }

        /* --- NAVIGATION --- */
        nav {
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(7, 7, 8, 0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, var(--neon-cyan), var(--electric-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; cursor: pointer; }
        .search-container { position: relative; flex: 0 1 350px; }
        #search-input { width: 100%; padding: 10px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; }

        /* --- SUGGESTIONS UI --- */
        #search-suggestions {
            position: absolute; width: 100%; background: #151516; border-radius: 12px; top: 55px; z-index: 5000; 
            overflow: hidden; display: none; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .suggestion-item { padding: 10px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .suggestion-item:hover { background: rgba(255,255,255,0.1); }
        .suggestion-item img { width: 35px; height: 50px; object-fit: cover; border-radius: 4px; }

        /* --- CARDS & ANIMATIONS --- */
        .movie-card {
            background: var(--card-glass); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border 0.3s;
            cursor: pointer; position: relative;
        }
        .movie-card:active { transform: scale(0.94); }
        .movie-card:hover { border-color: var(--neon-cyan); }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-add { animation: scaleIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; border-color: var(--neon-cyan) !important; }

        /* --- INFO PAGE --- */
        .info-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000; display: none; overflow-y: auto;
            opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .info-page.active { display: block; opacity: 1; transform: translateY(0); }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 1.5rem; background: rgba(255,255,255,0.1); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 2001; }

        .backdrop-header { width: 100%; height: 60vh; position: relative; }
        .backdrop-header img { width: 100%; height: 100%; object-fit: cover; }
        .backdrop-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent, var(--bg-dark)); }

        .content-wrap { padding: 0 8% 50px; margin-top: -100px; position: relative; display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
        .poster-main { width: 100%; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 25px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .meta-item label { display: block; color: var(--neon-cyan); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .meta-item span { font-size: 0.95rem; color: #eee; }

        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .cast-card { flex: 0 0 100px; text-align: center; }
        .cast-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 50%; margin-bottom: 8px; border: 2px solid rgba(255,255,255,0.1); }
        .cast-card p { font-size: 0.7rem; color: var(--text-dim); }

        .lang-pill { display: inline-block; padding: 4px 10px; background: rgba(0, 242, 255, 0.1); color: var(--neon-cyan); border-radius: 6px; font-size: 0.8rem; margin: 4px; border: 1px solid rgba(0, 242, 255, 0.2); }

        .section-title { padding: 30px 5% 15px; font-size: 1.1rem; color: var(--text-dim); letter-spacing: 2px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 5% 40px; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .p-2 { padding: 12px; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--electric-purple); padding: 10px 20px; border-radius: 30px; z-index: 5000; display: none; }

        /* Watch Status Styles */
        .watched-active {
            background: #22c55e !important;
            color: black !important;
            border: none !important;
            transform: scale(1.05);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1.05); }
        }

        .watched-click {
            animation: pop 0.3s ease;
        }

        @media (max-width: 768px) {
            .content-wrap { grid-template-columns: 1fr; margin-top: -50px; text-align: center; }
            .poster-main { width: 180px; margin: 0 auto; }
            .meta-grid { text-align: left; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">WATCHFLOW</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search movies..." autocomplete="off">
            <div id="search-suggestions"></div>
        </div>
    </nav>

    <div id="main-content">
        <h2 class="section-title">Trending Today</h2>
        <div class="movie-grid" id="discovery-grid"></div>
        
        <h2 class="section-title">My Watchlist</h2>
        <div class="movie-grid" id="watchlist-grid"></div>
        
        <h2 class="section-title">Watched</h2>
        <div class="movie-grid" id="watched-grid"></div>
    </div>

    <div id="info-page" class="info-page">
        <button class="close-btn" onclick="closeInfo()">&times;</button>
        <div id="info-content"></div>
    </div>

    <div id="toast"></div>

    <script>
        const API_KEY = "880596d85d5faf3467c9276888a2cfa0";
        const IMG_W500 = "https://image.tmdb.org/t/p/w500";
        const IMG_ORIG = "https://image.tmdb.org/t/p/original";

        // Global DOM References
        const sInput = document.getElementById('search-input');
        const sBox = document.getElementById('search-suggestions');

        let watchlist = JSON.parse(localStorage.getItem('watchflow_list')) || [];
        let watched = JSON.parse(localStorage.getItem('watchflow_watched')) || [];

        async function init() {
            try {
                const trending = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`).then(res => res.json());
                const grid = document.getElementById('discovery-grid');
                grid.innerHTML = trending.results.map(m => `
                    <div class="movie-card" onclick="openInfo('${m.id}', '${m.media_type || 'movie'}')">
                        <img src="${IMG_W500}${m.poster_path}" alt="Poster">
                        <div class="p-2">
                            <h4 style="font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${m.title || m.name}</h4>
                            <span style="font-size:0.7rem; color:var(--neon-cyan)">★ ${m.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                `).join('');
                renderWatchlist();
                renderWatched();
            } catch (e) { console.error(e); }
        }

        async function openInfo(id, type) {
            try {
                const [main, credits, langs] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`).then(res => res.json()),
                    fetch(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${API_KEY}`).then(res => res.json()),
                    fetch(`https://api.themoviedb.org/3/${type}/${id}/translations?api_key=${API_KEY}`).then(res => res.json())
                ]);
                
                const director = credits.crew.find(c => c.job === 'Director')?.name || 'N/A';
                const writer = credits.crew.find(c => c.job === 'Writer' || c.job === 'Screenplay')?.name || 'N/A';
                const cast = credits.cast.slice(0, 8);
                const dubs = langs.translations.map(t => t.english_name);

                document.getElementById('info-content').innerHTML = `
                    <div class="backdrop-header">
                        <img src="${IMG_ORIG}${main.backdrop_path}">
                        <div class="backdrop-overlay"></div>
                    </div>
                    <div class="content-wrap">
                        <div>
                            <img src="${IMG_W500}${main.poster_path}" class="poster-main">
                            <button id="add-btn" onclick="addToWatchlist('${main.id}', \`${(main.title || main.name)}\`, '${main.poster_path}')" 
                                    style="width:100%; margin-top:20px; padding:15px; border-radius:10px; border:none; background:var(--neon-cyan); color:black; font-weight:bold; cursor:pointer;">
                                + Add to Watchlist
                            </button>
                            <button id="watched-btn" onclick="toggleWatched('${main.id}', this)" 
                                    style="width:100%; margin-top:10px; padding:12px; border-radius:10px; border:1px solid var(--neon-cyan); background:transparent; color:var(--neon-cyan); font-weight:bold; cursor:pointer; transition:0.3s;">
                                ✔ Mark as Watched
                            </button>
                        </div>
                        <div>
                            <h1 style="font-size: 2.5rem; margin-bottom: 5px">${main.title || main.name}</h1>
                            <p style="color: var(--neon-cyan); font-weight: 600; margin-bottom: 20px">★ ${main.vote_average.toFixed(1)} / 10</p>
                            <p style="line-height: 1.8; color: #ccc; margin-bottom: 30px">${main.overview}</p>
                            <div class="meta-grid">
                                <div class="meta-item"><label>Release</label><span>${main.release_date || main.first_air_date}</span></div>
                                <div class="meta-item"><label>Director</label><span>${director}</span></div>
                                <div class="meta-item"><label>Writer</label><span>${writer}</span></div>
                                <div class="meta-item"><label>Language</label><span>${main.original_language?.toUpperCase()}</span></div>
                            </div>
                            <h3 style="margin-bottom:15px; font-size:1rem">TOP CAST</h3>
                            <div class="cast-row">${cast.map(c => `<div class="cast-card"><img src="${c.profile_path ? IMG_W500 + c.profile_path : 'https://via.placeholder.com/100'}"><p style="color:white; font-weight:600">${c.name}</p></div>`).join('')}</div>
                            <h3 style="margin: 30px 0 15px; font-size:1rem">DUBBING AVAILABLE</h3>
                            <div>${dubs.slice(0, 10).map(l => `<span class="lang-pill">${l}</span>`).join('')}</div>
                        </div>
                    </div>
                `;
                
                if (watchlist.some(m => m.id == id)) updateBtnUI(true);
                
                // Set Watched UI State
                const wbtn = document.getElementById('watched-btn');
                if (watched.includes(id.toString())) {
                    wbtn.innerText = "✔ Watched";
                    wbtn.classList.add("watched-active");
                }

                const page = document.getElementById('info-page');
                page.style.display = 'block';
                setTimeout(() => page.classList.add('active'), 10);
                document.body.style.overflow = 'hidden';
            } catch (e) { console.error(e); }
        }

        function closeInfo() {
            const page = document.getElementById('info-page');
            page.classList.remove('active');
            setTimeout(() => { page.style.display = 'none'; document.body.style.overflow = 'auto'; }, 400);
        }

        function updateBtnUI(isAdded) {
            const btn = document.getElementById('add-btn');
            if(btn && isAdded) { btn.innerText = "✓ Added"; btn.style.background = "#222"; btn.style.color = "#888"; btn.onclick = null; }
        }

        function addToWatchlist(id, title, posterPath) {
            if (watchlist.some(m => m.id == id)) return;
            watchlist.push({ id, title, poster: IMG_W500 + posterPath, progress: 0, isNew: true });
            localStorage.setItem('watchflow_list', JSON.stringify(watchlist));
            updateBtnUI(true);
            renderWatchlist();
            setTimeout(closeInfo, 300);
        }

        function renderWatchlist() {
            const grid = document.getElementById('watchlist-grid');
            if (watchlist.length === 0) { grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color:#666;">Empty list.</p>`; return; }
            
            grid.innerHTML = watchlist.map((item, idx) => `
                <div class="movie-card ${item.isNew ? 'animate-add' : ''}">
                    <img onclick="openInfo('${item.id}', 'movie')" src="${item.poster}">
                    <div class="p-2">
                        <h4 style="font-size:0.85rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.title}</h4>
                        <div style="width: 100%; height: 4px; background: #222; margin: 8px 0; border-radius: 2px;">
                            <div style="width: ${item.progress}%; height: 100%; background: var(--neon-cyan);"></div>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button style="flex:1; background:#333; border:none; color:white; padding:4px; border-radius:4px; cursor:pointer" onclick="updateProg(${idx})">Log</button>
                            <button style="background:rgba(255,0,0,0.2); border:none; color:red; padding:4px 8px; border-radius:4px; cursor:pointer" onclick="removeMovie(${idx})">×</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            watchlist.forEach(i => delete i.isNew);
            localStorage.setItem('watchflow_list', JSON.stringify(watchlist));
        }

        function renderWatched() {
            const grid = document.getElementById('watched-grid');
            const watchedItems = watchlist.filter(item => watched.includes(item.id.toString()));

            if (watchedItems.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color:#666;">No watched movies yet.</p>`;
                return;
            }

            grid.innerHTML = watchedItems.map(item => `
                <div class="movie-card">
                    <img onclick="openInfo('${item.id}', 'movie')" src="${item.poster}">
                    <div class="p-2">
                        <h4 style="font-size:0.85rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.title}</h4>
                        <span style="color:#22c55e; font-size:0.75rem;">✔ Watched</span>
                    </div>
                </div>
            `).join('');
        }

        function updateProg(idx) {
            watchlist[idx].progress = (watchlist[idx].progress + 25) % 125;
            if(watchlist[idx].progress > 100) watchlist[idx].progress = 100;
            localStorage.setItem('watchflow_list', JSON.stringify(watchlist));
            renderWatchlist();
        }

        function removeMovie(idx) {
            watchlist.splice(idx, 1);
            localStorage.setItem('watchflow_list', JSON.stringify(watchlist));
            renderWatchlist();
            renderWatched();
        }

        function toggleWatched(id, btn) {
            const idStr = id.toString();
            const index = watched.indexOf(idStr);

            if (index === -1) {
                watched.push(idStr);
                btn.innerText = "✔ Watched";
                btn.classList.add("watched-active");
            } else {
                watched.splice(index, 1);
                btn.innerText = "✔ Mark as Watched";
                btn.classList.remove("watched-active");
            }

            btn.classList.add("watched-click");
            setTimeout(() => btn.classList.remove("watched-click"), 300);

            localStorage.setItem('watchflow_watched', JSON.stringify(watched));
            renderWatched(); 
        }

        // --- SEARCH LOGIC ---
        sInput.addEventListener('input', async (e) => {
            const q = e.target.value;
            if (q.length < 2) { sBox.style.display = 'none'; return; }
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`).then(res => res.json());
                const items = res.results.filter(m => m.poster_path).slice(0, 6);
                if (items.length > 0) {
                    sBox.innerHTML = items.map(m => `
                        <div class="suggestion-item" onclick="openInfo('${m.id}', '${m.media_type || 'movie'}'); document.getElementById('search-suggestions').style.display='none'; document.getElementById('search-input').value='';">
                            <img src="${IMG_W500}${m.poster_path}">
                            <div>
                                <div style="font-size:0.9rem; color:white;">${m.title || m.name}</div>
                                <div style="font-size:0.7rem; color:var(--neon-cyan)">${(m.release_date || m.first_air_date || '').split('-')[0]}</div>
                            </div>
                        </div>`).join('');
                    sBox.style.display = 'block';
                } else { sBox.style.display = 'none'; }
            } catch (err) { console.error(err); }
        });

        document.addEventListener('click', (e) => { 
            if (!e.target.closest('.search-container')) sBox.style.display = 'none'; 
        });

        init();
    </script>
</body>
</html>
